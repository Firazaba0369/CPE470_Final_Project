<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-labelledby="title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Arduino duel</p>
            <h1 id="title">Rock Paper Scissors</h1>
          </div>
          <div class="connection" id="connectionStatus">Not connected</div>
        </div>

        <div class="game-grid">
          <section class="arena">
            <div class="countdown" id="countdown">Ready?</div>

            <div
              style="
                display: flex;
                gap: 24px;
                align-items: stretch;
                justify-content: center;
                width: 100%;
              "
            >
              <!-- Web App Choice -->
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  gap: 8px;
                "
              >
                <span
                  style="
                    color: var(--muted);
                    font-weight: 800;
                    text-transform: uppercase;
                    font-size: 0.8rem;
                  "
                  >Computer</span
                >
                <div
                  class="choice-display"
                  id="webChoice"
                  style="
                    margin: 0;
                    width: 180px;
                    height: 180px;
                    min-height: unset;
                    aspect-ratio: unset;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                  "
                >
                  <span class="choice-icon">?</span>
                  <span class="choice-label">Hidden</span>
                </div>
              </div>

              <!-- Arduino (User) Choice -->
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  gap: 8px;
                "
              >
                <span
                  style="
                    color: var(--muted);
                    font-weight: 800;
                    text-transform: uppercase;
                    font-size: 0.8rem;
                  "
                  >Arduino Camera</span
                >
                <section
                  class="choice-display"
                  aria-label="Serial image capture"
                  style="
                    margin: 0;
                    width: 180px;
                    height: 180px;
                    padding: 12px;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    min-height: unset;
                    aspect-ratio: unset;
                  "
                >
                  <canvas
                    id="captureCanvas"
                    width="64"
                    height="64"
                    aria-label="Serial image preview"
                    style="
                      display: block;
                      margin: 0 auto;
                      border-radius: 4px;
                      width: 100%;
                      max-width: 100%;
                      flex: 1;
                      min-height: 0;
                      min-width: 0;
                      object-fit: contain;
                      background: transparent;
                      image-rendering: pixelated;
                    "
                  ></canvas>
                  <span
                    class="choice-label"
                    id="userChoiceLabel"
                    style="margin-top: 8px; text-align: center"
                    >Waiting</span
                  >
                </section>
              </div>
            </div>

            <p class="prompt" id="prompt">Click play when you're ready.</p>
            <button class="primary-action" id="playButton" type="button">
              Play game
            </button>
          </section>

          <aside class="scoreboard">
            <div class="score-row">
              <span>You</span>
              <strong id="userWins">0</strong>
            </div>
            <div class="score-row">
              <span>Web app</span>
              <strong id="webWins">0</strong>
            </div>
            <div class="rounds" id="rounds"></div>
          </aside>
        </div>

        <section class="result-panel" id="resultPanel" aria-live="polite">
          <span id="resultText">Waiting for the first round.</span>
        </section>

        <section class="simulate-panel" aria-label="Arduino simulator">
          <span>Arduino sends</span>
          <div class="simulate-actions">
            <button type="button" data-choice="rock">Rock</button>
            <button type="button" data-choice="paper">Paper</button>
            <button type="button" data-choice="scissors">Scissors</button>
          </div>
        </section>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
